syntax = "proto3";
package tutorial;

import "google/protobuf/timestamp.proto";

option csharp_namespace = "Google.Protobuf.Protocol";

enum MsgID
{
	S_CONNECTED = 0;
	C_CREATE_PLAYER = 1;
	S_ENTER = 2;
	C_ENTER_GAMEROOM = 3;
}

message S_Connected
{
}

message C_CreatePlayer
{
	PlayerInfo playerInfo = 1;
}

message S_Enter
{

}

message C_EnterGameRoom
{

}

message PlayerInfo
{
	string name = 1;
	int32 modelIndex = 2;
}
