syntax = "proto3";
package tutorial;

import "google/protobuf/timestamp.proto";

option csharp_namespace = "Google.Protobuf.Protocol";

enum MsgID
{
	C_ENTER = 0;
	S_CHAT = 1;
	C_MOVE = 2;
	S_MOVE = 3;
}

message C_Enter
{
	PlayerInfo playerInfo = 1;

}
message S_Chat
{
	string msg = 1;
}

message C_Move
{
	PositionInfo pos = 1;
}

message S_Move
{
	PlayerInfo playerInfo = 1;
	PositionInfo pos = 2;
}

message PlayerInfo {

  int32 playerId = 1;
  string name = 2;
}

message PositionInfo
{
  int32 posX = 1;
  int32 posY = 2;
}