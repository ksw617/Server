syntax = "proto3";
package tutorial;

import "google/protobuf/timestamp.proto";

option csharp_namespace = "Google.Protobuf.Protocol";

enum MsgID
{
	S_ENTER_OK = 0;
	C_CONNECT = 1;
	S_SPAWN = 2;
	S_ENTER_PLAYER = 3;
	C_MOVE = 4;
	S_MOVE = 5;

}

message S_EnterOk
{
}

message C_Connect
{
	PlayerInfo playerInfo = 1;
}

message S_Spawn
{
	int32 playerID = 1;
	repeated PlayerInfo playerInfos = 2;
}

message S_EnterPlayer
{
	int32 playerID = 1;
	PlayerInfo playerInfo = 2;
}


message C_Move
{
	Position pos = 1;
}

message S_Move
{
	int32 playerID = 1;
	Position pos = 2;
}

message PlayerInfo
{
	string name = 1;
	int32 modelIndex = 2;
	Position pos = 3;

}

message Position
{
	int32 x = 1;
	int32 y = 2;
}
